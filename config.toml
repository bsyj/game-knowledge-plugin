[plugin]
enabled = true
config_version = "0.1.2"

[storage]
data_dir = "data/game-knowledge"

[embedding]
dimension = 1024
batch_size = 32
max_concurrent = 5
model_name = "auto"
enable_cache = true
min_train_threshold = 40

[web]
enabled = true
host = "127.0.0.1"
port = 5810
cleanup_stale_runner_on_port_conflict = true

[episode]
enabled = false
generation_enabled = false
pending_batch_size = 12
pending_max_retry = 3

[collector]
enabled = true
# 群 ID 白名单：只采集/分析这些群的消息；留空表示不限制
allowed_source_group_ids = []
auto_analyze_threshold = 30
min_message_length = 3
context_length = 50
llm_task_name = "utils"
enable_ai_review = true
ai_review_task_name = "utils"
ai_review_error_status = "pending"

[advanced]
enable_auto_save = true
auto_save_interval_minutes = 5
debug = false
notify_observer_group = false
